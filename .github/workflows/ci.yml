name: Polymath Identity Prism CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_audit:
    name: System Logic Audit & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Vibe Protocol)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install System Dependencies
        run: npm ci

      - name: Verify Typescript Alignments
        run: npm run lint

      - name: Compile Cognitive Maps (Vite Build)
        run: npm run build
        
      - name: Telemetry Check
        run: echo "System stable. UI and Mock RAG boundaries verified."
